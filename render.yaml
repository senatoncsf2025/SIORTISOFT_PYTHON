services:
  - type: web
    name: siortisoft
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn SIORTISOFT.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://siortisoft.onrender.com"
      - key: SECRET_KEY
        generateValue: true
      - key: EMAIL_HOST_USER
        value: "elkingustavo15@gmail.com"
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: siortisoft-db
          property: connectionString

databases:
  - name: siortisoft-db