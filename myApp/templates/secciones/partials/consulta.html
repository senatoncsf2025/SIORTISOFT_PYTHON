<div class="card p-4 d-none" id="formConsulta">
    <h4 class="mb-3">Consulta de {{ rol|capfirst }}</h4>
    <form method="POST" action="">
        {% csrf_token %}

        <div class="mb-3">
            <label for="cedula" class="form-label">
                Documento <span class="text-danger">*</span>
            </label>
            <input
                type="text"
                class="form-control {% if errors.cedula %}is-invalid{% endif %}"
                id="cedula"
                name="cedula"
                value="{{ cedula|default:'' }}"
                required
            >
            {% if errors.cedula %}
                <div class="invalid-feedback">{{ errors.cedula }}</div>
            {% endif %}
        </div>

        <div class="mb-3">
            <label for="tipo" class="form-label">
                Tipo de Movimiento <span class="text-danger">*</span>
            </label>
            <select
                name="tipo"
                id="tipo"
                class="form-control {% if errors.tipo %}is-invalid{% endif %}"
                required
            >
                <option value="">Seleccione...</option>
                <option value="ingreso" {% if tipo == 'ingreso' %}selected{% endif %}>Ingreso</option>
                <option value="salida" {% if tipo == 'salida' %}selected{% endif %}>Salida</option>
            </select>
            {% if errors.tipo %}
                <div class="invalid-feedback">{{ errors.tipo }}</div>
            {% endif %}
        </div>

        <div class="mb-3">
            <label for="observaciones" class="form-label">Observaciones (opcional)</label>
            <textarea name="observaciones" id="observaciones" class="form-control">{{ observaciones|default:'' }}</textarea>
        </div>

        <button type="submit" class="btn btn-primary">Registrar Movimiento</button>
    </form>
</div>
