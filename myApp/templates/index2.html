
{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Principal - SIORTISOFT</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div style="padding-top: 40px;"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Panel Principal</h1>
        <h2 class="text-center mb-4">Usuarios</h2>

        <div class="row g-4">
            <div class="col-md-4">
                <a href="{% url 'personal.index' %}" class="text-decoration-none text-dark">
                    <div class="card dashboard-card text-center" id="cardUsuarios">
                        <div class="card-body">
                            <h5 class="card-title">Personal</h5>
                        </div>
                    </div>
                </a>
            </div>

            <div class="col-md-4">
                <a href="{% url 'estudiantes.index' %}" class="text-decoration-none text-dark">
                    <div class="card dashboard-card text-center" id="cardEstudiantes">
                        <div class="card-body">
                            <h5 class="card-title">Estudiantes</h5>
                        </div>
                    </div>
                </a>
            </div>

            <div class="col-md-4">
                <a href="{% url 'docentes.index' %}" class="text-decoration-none text-dark">
                    <div class="card dashboard-card text-center" id="cardDocentes">
                        <div class="card-body">
                            <h5 class="card-title">Docentes</h5>
                        </div>
                    </div>
                </a>
            </div>

            <div class="col-12 mt-4">
                <h2 class="text-center mb-4">Administrativos</h2>
            </div>

            <div class="col-md-4">
                <a href="{% url 'oficinas.index' %}" class="text-decoration-none text-dark">
                    <div class="card dashboard-card text-center" id="cardOficinas">
                        <div class="card-body">
                            <h5 class="card-title">Oficinas</h5>
                        </div>
                    </div>
                </a>
            </div>

            <div class="col-md-4">
                <a href="{% url 'vigilantes.index' %}" class="text-decoration-none text-dark">
                    <div class="card dashboard-card text-center" id="cardVigilantes">
                        <div class="card-body">
                            <h5 class="card-title">Vigilantes</h5>
                        </div>
                    </div>
                </a>
            </div>

            <div class="col-md-4">
                <a href="{% url 'enfermeria.index' %}" class="text-decoration-none text-dark">
                    <div class="card dashboard-card text-center" id="cardEnfermeria">
                        <div class="card-body">
                            <h5 class="card-title">Enfermería</h5>
                        </div>
                    </div>
                </a>
            </div>

            <div class="col-12 mt-4">
                <h2 class="text-center mb-4">Servicios</h2>
            </div>

            <div class="col-md-4">
                <a href="{% url 'parqueadero.index' %}" class="text-decoration-none text-dark">
                    <div class="card dashboard-card text-center" id="cardParqueadero">
                        <div class="card-body">
                            <h5 class="card-title">Parqueadero</h5>
                        </div>
                    </div>
                </a>
            </div>

            <div class="col-md-4">
                <a href="{% url 'visitantes.index' %}" class="text-decoration-none text-dark">
                    <div class="card dashboard-card text-center" id="cardVisitantes">
                        <div class="card-body">
                            <h5 class="card-title">Visitantes</h5>
                        </div>
                    </div>
                </a>
            </div>

            <div class="col-md-4">
                <a href="{% url 'acudientes.index' %}" class="text-decoration-none text-dark">
                    <div class="card dashboard-card text-center" id="cardAcudientes">
                        <div class="card-body">
                            <h5 class="card-title">Acudientes</h5>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/dashboard.js' %}"></script>
</body>
</html>
