{% extends "layouts/app.html" %}

{% block title %}Crear {{ rol_singular|capfirst }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-0">Crear {{ rol_singular|capfirst }}</h1>
        <a href="{% url index_url_name %}" class="btn btn-secondary">Volver</a>
    </div>

    <form method="post" class="card shadow-sm p-4">
        {% csrf_token %}

        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Nombre</label>
                <input type="text" name="nombre" class="form-control" value="{{ form_data.nombre|default:'' }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Apellido</label>
                <input type="text" name="apellido" class="form-control" value="{{ form_data.apellido|default:'' }}">
            </div>
            <div class="col-md-6">
                <label class="form-label">Cédula</label>
                <input type="text" name="cedula" class="form-control" value="{{ form_data.cedula|default:'' }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" value="{{ form_data.email|default:'' }}">
            </div>
            <div class="col-md-6">
                <label class="form-label">Teléfono</label>
                <input type="text" name="telefono" class="form-control" value="{{ form_data.telefono|default:'' }}">
            </div>
            <div class="col-md-6">
                <label class="form-label">Dirección</label>
                <input type="text" name="direccion" class="form-control" value="{{ form_data.direccion|default:'' }}">
            </div>
            <div class="col-md-6">
                <label class="form-label">Género</label>
                <select name="genero" class="form-select">
                    <option value="">Seleccione</option>
                    {% for value, label in generos %}
                        <option value="{{ value }}" {% if form_data.genero == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Tipo de usuario</label>
                <select name="tipo_usuario" class="form-select">
                    <option value="">Seleccione</option>
                    {% for value, label in tipos_usuario %}
                        <option value="{{ value }}" {% if form_data.tipo_usuario == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Fecha de nacimiento</label>
                <input type="date" name="fecha_nacimiento" class="form-control" value="{{ form_data.fecha_nacimiento|default:'' }}">
            </div>
            <div class="col-md-6">
                <label class="form-label">Cargo</label>
                <input type="text" name="cargo" class="form-control" value="{{ form_data.cargo|default:'' }}">
            </div>
            {% if rol == 'vigilantes' %}
            <div class="col-md-6">
                <label class="form-label">Código de vigilante</label>
                <input type="text" name="codigo_vigilante" class="form-control" value="{{ form_data.codigo_vigilante|default:'' }}">
            </div>
            {% endif %}
        </div>

        <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="{% url index_url_name %}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
