{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
        }
        h1 { text-align: center; margin-bottom: 28px; color: #333; font-size: 28px; }
        input {
            width: 100%; padding: 12px 16px; margin-bottom: 16px;
            border: 1px solid #ddd; border-radius: 8px; font-size: 15px;
            outline: none; transition: border 0.3s;
        }
        input:focus { border-color: #4a90e2; }
        button {
            width: 100%; padding: 13px; background: #4a90e2;
            color: white; border: none; border-radius: 8px;
            font-size: 16px; cursor: pointer; transition: background 0.3s;
        }
        button:hover { background: #357abd; }
        .links { text-align: center; margin-top: 20px; }
        .links a { color: #4a90e2; text-decoration: none; font-size: 14px; }
        .links a:hover { text-decoration: underline; }
        .error {
            background: #ffe0e0; color: #c0392b; padding: 10px;
            border-radius: 6px; margin-bottom: 16px; font-size: 14px; text-align: center;
        }
        .success {
            background: #e0ffe0; color: #27ae60; padding: 10px;
            border-radius: 6px; margin-bottom: 16px; font-size: 14px; text-align: center;
        }
    </style>
</head>
<body>
<div class="login-card">
    <h1>Login</h1>
    {% if messages %}
        {% for message in messages %}
            <div class="{% if message.tags == 'error' %}error{% else %}success{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Usuario" value="{{ username|default:'' }}" required>
        <input type="password" name="password" placeholder="Contraseña" required>
        <button type="submit">Ingresar</button>
    </form>
    <div class="links">
        <a href="{% url 'register' %}">¿No tienes cuenta? Regístrate</a>
    </div>
</div>
</body>
</html>
